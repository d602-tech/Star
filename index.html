<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>114年度從業人員安全衛生優良事蹟評選系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .fade-in {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="text-gray-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 🔴 請替換成您在 GAS 部署時取得的 Web App URL
    const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbw7uChOFkNVUdNMYEG4jAlNUEg8gSoDb3zUgS2WjQX37vFqvmdHmdbTOQEaKwiRRxpu/exec";

    // --- API 呼叫模組 ---
    async function apiCall(action, params = {}) {
      try {
        const res = await fetch(GAS_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...params })
        });
        const data = await res.json();
        if (data && typeof data.success !== 'undefined' && !data.success) {
          throw new Error(data.error || data.message || 'API 操作失敗');
        }
        return data;
      } catch (err) {
        console.error("API call error:", err);
        alert("連線或伺服器錯誤: " + err.message);
        return null;
      }
    }

    // --- 共用 UI 元件 ---
    const Loading = () => <div className="py-20 text-center"><div className="loader mb-4"></div><p className="text-gray-500 font-medium">載入中，請稍候...</p></div>;

    // --- 主要元件 ---
    function App() {
      const [view, setView] = useState('gateway'); // gateway, adminLogin, voterLogin, adminPanel, voterPanel
      const [currentUser, setCurrentUser] = useState(null); // 委員登入後的資訊

      // 主畫面路由
      if (view === 'gateway') return <Gateway setView={setView} />;
      if (view === 'adminLogin') return <AdminLogin setView={setView} />;
      if (view === 'voterLogin') return <VoterLogin setView={setView} onLogin={(user) => { setCurrentUser(user); setView('voterPanel'); }} />;
      if (view === 'adminPanel') return <AdminPanel setView={setView} />;
      if (view === 'voterPanel') return <VoterPanel setView={setView} user={currentUser} onLogout={() => { setCurrentUser(null); setView('gateway'); }} />;
      return null;
    }

    // 1. 系統入口
    function Gateway({ setView }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
          <div className="glass p-10 rounded-2xl shadow-xl w-full max-w-lg text-center fade-in">
            <h1 className="text-3xl font-bold text-blue-900 mb-2">114年度優良事蹟評選系統</h1>
            <p className="text-gray-500 mb-8">請選擇登入身分進入系統</p>
            <div className="space-y-4">
              <button onClick={() => setView('voterLogin')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-md transition-all text-lg">
                評選委員入口
              </button>
              <button onClick={() => setView('adminLogin')} className="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-semibold py-4 rounded-xl shadow-sm transition-all text-lg">
                系統管理員後台
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 2. 管理員登入
    function AdminLogin({ setView }) {
      const [acc, setAcc] = useState('');
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        if (acc === 'admin' && pwd === 'ad') {
          setView('adminPanel');
        } else {
          setErr('帳號或密碼錯誤');
        }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-900 p-6">
          <form className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm fade-in" onSubmit={handleLogin}>
            <h2 className="text-2xl font-bold text-center mb-6 text-gray-800">管理員登入</h2>
            {err && <div className="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">{err}</div>}
            <input type="text" placeholder="帳號" className="w-full border p-3 rounded mb-4" value={acc} onChange={e => setAcc(e.target.value)} required />
            <input type="password" placeholder="密碼" className="w-full border p-3 rounded mb-6" value={pwd} onChange={e => setPwd(e.target.value)} required />
            <button type="submit" className="w-full bg-gray-800 hover:bg-black text-white py-3 rounded font-bold transition">登入管理後台</button>
            <button type="button" onClick={() => setView('gateway')} className="w-full text-center text-sm text-gray-500 mt-4 hover:underline">返回首頁</button>
          </form>
        </div>
      );
    }

    // 3. 委員登入
    function VoterLogin({ setView, onLogin }) {
      const [loading, setLoading] = useState(true);
      const [committees, setCommittees] = useState([]);
      const [dept, setDept] = useState('');
      const [name, setName] = useState('');
      const [code, setCode] = useState('');
      const [err, setErr] = useState('');

      useEffect(() => {
        apiCall('getCommittees').then(res => {
          if (res) setCommittees(res);
          setLoading(false);
        });
      }, []);

      const departments = useMemo(() => [...new Set(committees.map(c => c['部門']))], [committees]);
      const availableNames = useMemo(() => committees.filter(c => c['部門'] === dept).map(c => c['委員姓名']), [dept, committees]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErr('');
        setLoading(true);
        const res = await apiCall('login', { name, login_code: code });
        setLoading(false);
        if (res && res.success) {
          onLogin(res.committee);
        } else {
          setErr(res?.message || '登入失敗');
        }
      };

      if (loading && committees.length === 0) return <Loading />;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-blue-50 p-6">
          <form className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in" onSubmit={handleLogin}>
            <h2 className="text-2xl font-bold text-center mb-6 text-blue-900">評選委員登入</h2>
            {err && <div className="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">{err}</div>}

            <div className="mb-4">
              <label className="block text-gray-700 text-sm font-bold mb-2">部門</label>
              <select className="w-full border p-3 rounded bg-gray-50" value={dept} onChange={e => { setDept(e.target.value); setName(''); }} required>
                <option value="">請選擇部門</option>
                {departments.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
            </div>

            <div className="mb-4">
              <label className="block text-gray-700 text-sm font-bold mb-2">姓名</label>
              <select className="w-full border p-3 rounded bg-gray-50" value={name} onChange={e => setName(e.target.value)} required disabled={!dept}>
                <option value="">請選擇姓名</option>
                {availableNames.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>

            <div className="mb-6">
              <label className="block text-gray-700 text-sm font-bold mb-2">專屬登入代號</label>
              <input type="password" placeholder="請輸入 4 碼登入代號" className="w-full border p-3 rounded bg-gray-50" value={code} onChange={e => setCode(e.target.value)} required />
            </div>

            <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition disabled:opacity-50">
              {loading ? '驗證中...' : '開始評選'}
            </button>
            <button type="button" onClick={() => setView('gateway')} className="w-full text-center text-sm text-gray-500 mt-4 hover:underline">返回首頁</button>
          </form>
        </div>
      );
    }

    // 4. 管理員後台 (Admin Panel)
    function AdminPanel({ setView }) {
      const [tab, setTab] = useState('results'); // results, candidates, committees
      return (
        <div className="min-h-screen bg-gray-100 fade-in">
          <nav className="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
              <div className="font-bold text-xl tracking-wider">管理員後台</div>
              <div className="flex space-x-2">
                <button onClick={() => setTab('results')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'results' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>排行榜</button>
                <button onClick={() => setTab('candidates')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'candidates' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>候選人管理</button>
                <button onClick={() => setTab('committees')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'committees' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>委員管理</button>
                <button onClick={() => setView('gateway')} className="px-4 py-2 rounded-md font-medium bg-red-600 hover:bg-red-700 transition ml-4">登出</button>
              </div>
            </div>
          </nav>
          <div className="max-w-7xl mx-auto px-4 py-8">
            {tab === 'results' && <AdminResults />}
            {tab === 'candidates' && <AdminCandidates />}
            {tab === 'committees' && <AdminCommittees />}
          </div>
        </div>
      );
    }

    // 4.1 管理員 - 排行榜
    function AdminResults() {
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadResults = () => {
        setLoading(true);
        apiCall('getResults').then(res => {
          if (res) {
            setResults(res);
            if (res.length > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
          }
          setLoading(false);
        });
      };

      useEffect(() => { loadResults(); }, []);

      if (loading) return <Loading />;

      return (
        <div className="fade-in">
          <div className="flex justify-between items-end mb-8">
            <h2 className="text-3xl font-bold text-gray-800">評選總排行榜</h2>
            <button onClick={loadResults} className="text-blue-600 hover:underline">重新整理</button>
          </div>

          <div className="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
            <table className="min-w-full divide-y divide-gray-200 text-left">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase">名次</th>
                  <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase">部門/姓名</th>
                  <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase">總得分</th>
                  <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase">得票數/平均</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {results.map((r, i) => (
                  <tr key={r.id} className={i < 3 ? 'bg-yellow-50' : ''}>
                    <td className="px-6 py-4 whitespace-nowrap">
                      {i === 0 ? '🥇 冠軍' : i === 1 ? '🥈 亞軍' : i === 2 ? '🥉 季軍' : `第 ${i + 1} 名`}
                    </td>
                    <td className="px-6 py-4">
                      <div className="font-bold text-gray-900">{r.name}</div>
                      <div className="text-sm text-gray-500">{r.department}</div>
                    </td>
                    <td className="px-6 py-4 font-extrabold text-blue-600 text-xl">{r.totalScore}</td>
                    <td className="px-6 py-4 text-sm text-gray-500">
                      獲得 {r.voteCount} 票 (平均: {r.average})
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // 4.2 管理員 - 候選人管理 (CRUD & 圖片無限上傳)
    function AdminCandidates() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadData = () => { setLoading(true); apiCall('getCandidates').then(res => { if (res) setData(res); setLoading(false); }); };
      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if (!confirm('確定要刪除？這將同步刪除所有該候選人的歷史得票！')) return;
        const res = await apiCall('deleteCandidate', { id });
        if (res && res.success) { alert('已刪除'); loadData(); }
      };

      const handleAdd = async () => {
        const dept = prompt('部門:'); if (!dept) return;
        const name = prompt('姓名:'); if (!name) return;
        const desc = prompt('事蹟簡介:'); if (!desc) return;
        const res = await apiCall('addCandidate', { department: dept, name, description: desc });
        if (res && res.success) loadData();
      };

      const handleUploadImage = async (id) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const base64 = ev.target.result;
            // 依需求：無限制圖片大小，直接上傳 Base64
            setLoading(true);
            const res = await apiCall('uploadImage', { id, image_url: base64 });
            if (res && res.success) { alert('上傳成功'); loadData(); } else { setLoading(false); }
          };
          reader.readAsDataURL(file);
        };
        input.click();
      };

      if (loading) return <Loading />;

      return (
        <div className="fade-in">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-3xl font-bold text-gray-800">候選人管理</h2>
            <button onClick={handleAdd} className="bg-green-600 text-white px-4 py-2 rounded font-bold shadow hover:bg-green-700">+ 新增候選人</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {data.map(c => (
              <div key={c['候選人ID']} className="bg-white rounded-xl shadow p-6 relative border border-gray-100">
                <div className="absolute top-4 right-4 flex space-x-2">
                  <button onClick={() => handleDelete(c['候選人ID'])} className="bg-red-100 text-red-600 px-2 py-1 text-xs rounded font-bold hover:bg-red-200">刪除</button>
                </div>
                {c['照片'] ? (
                  <img src={c['照片']} alt={c['姓名']} className="w-full h-48 object-cover rounded-lg mb-4 cursor-pointer hover:opacity-80 transition" onClick={() => handleUploadImage(c['候選人ID'])} title="點擊更換照片" />
                ) : (
                  <div onClick={() => handleUploadImage(c['候選人ID'])} className="w-full h-48 bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center mb-4 cursor-pointer hover:bg-gray-200 transition text-gray-400 font-medium">
                    + 點擊上傳照片
                  </div>
                )}
                <div className="text-sm font-bold text-blue-600 mb-1">{c['部門']}</div>
                <div className="text-xl font-extrabold text-gray-900 mb-2">{c['姓名']}</div>
                <p className="text-gray-600 text-sm whitespace-pre-wrap h-24 overflow-y-auto">{c['優良事蹟簡介']}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // 4.3 管理員 - 委員管理
    function AdminCommittees() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadData = () => { setLoading(true); apiCall('getCommittees').then(res => { if (res) setData(res); setLoading(false); }); };
      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if (!confirm('刪除將無法復原，確認？')) return;
        const res = await apiCall('deleteCommittee', { id });
        if (res && res.success) loadData();
      };

      if (loading) return <Loading />;

      return (
        <div className="fade-in bg-white p-6 rounded-xl shadow border border-gray-200">
          <div className="mb-6 flex justify-between">
            <h2 className="text-2xl font-bold">委員名單</h2>
            <div className="text-sm text-gray-500">注意：新增請直接至 Google Sheets 直接填寫更加快速喔。</div>
          </div>
          <table className="w-full text-left">
            <thead className="bg-gray-50 border-b">
              <tr>
                <th className="p-4">部門</th><th className="p-4">姓名</th><th className="p-4">登入代號</th><th className="p-4">操作</th>
              </tr>
            </thead>
            <tbody className="divide-y">
              {data.map(c => (
                <tr key={c['委員ID']}>
                  <td className="p-4">{c['部門']}</td><td className="p-4">{c['委員姓名']}</td><td className="p-4 font-mono">{c['登入代號(密碼)']}</td>
                  <td className="p-4"><button onClick={() => handleDelete(c['委員ID'])} className="text-red-600 font-bold text-sm">刪除</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )
    }

    // 5. 委員評分面板 (Voter Panel)
    function VoterPanel({ setView, user, onLogout }) {
      const committeeCode = user['登入代號(密碼)'];
      const [candidates, setCandidates] = useState([]);
      const [scores, setScores] = useState({});
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        // 同步取得候選人與歷史投票紀錄
        Promise.all([
          apiCall('getCandidates'),
          apiCall('getVotes', { committee_code: committeeCode })
        ]).then(([candRes, voteRes]) => {
          if (candRes) setCandidates(candRes);
          if (voteRes) {
            const initScores = {};
            voteRes.forEach(v => { initScores[v['候選人ID']] = Number(v['分數']); });
            setScores(initScores);
          }
          setLoading(false);
        });
      }, [committeeCode]);

      const handleScoreChange = (id, val) => {
        setScores(prev => ({ ...prev, [id]: Number(val) }));
      };

      const handleSubmit = async () => {
        // 防呆：每一位都必須填寫
        const unvoted = candidates.filter(c => !scores[c['候選人ID']]);
        if (unvoted.length > 0) {
          alert(`您還有 ${unvoted.length} 位尚未評分喔！請將所有人評分完畢再送出。`);
          // 滾動到第一個未評分
          const el = document.getElementById(`cand-${unvoted[0]['候選人ID']}`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }

        setSaving(true);
        const payloadVotes = candidates.map(c => ({
          candidateId: c['候選人ID'],
          score: scores[c['候選人ID']]
        }));

        const res = await apiCall('vote', { committee_code: committeeCode, votes: payloadVotes });
        setSaving(false);
        if (res && res.success) {
          confetti({ particleCount: 100, spread: 70 });
          alert('評分送出成功！您隨時可以再次登入修改。');
        }
      };

      if (loading) return <Loading />;

      return (
        <div className="min-h-screen bg-gray-50 fade-in pb-32">
          {/* Header */}
          <div className="bg-blue-600 text-white shadow-md sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-xl font-bold">評選區</h1>
                <div className="text-sm text-blue-200">您好，{user['部門']} - {user['委員姓名']}</div>
              </div>
              <button onClick={onLogout} className="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-bold transition">登出返回</button>
            </div>
          </div>

          <div className="max-w-4xl mx-auto px-4 py-8 space-y-8">
            <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-blue-800 font-medium text-sm">
              請瀏覽以下優良事蹟，並為每位候選人給予 1 到 5 分的評分（5星為最高分）。所有候選人均需評分後才可送出。
            </div>

            {candidates.map(c => (
              <div key={c['候選人ID']} id={`cand-${c['候選人ID']}`} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row gap-6 hover:shadow-md transition">
                {/* 照片區 */}
                <div className="w-full md:w-48 flex-shrink-0">
                  {c['照片'] ? (
                    <img src={c['照片']} alt={c['姓名']} className="w-full h-48 md:h-full object-cover rounded-xl shadow-sm" />
                  ) : (
                    <div className="w-full h-48 md:h-full bg-gray-100 rounded-xl flex items-center justify-center text-gray-400 shadow-inner">無照片</div>
                  )}
                </div>

                {/* 內容評分區 */}
                <div className="flex-grow flex flex-col justify-between">
                  <div>
                    <div className="text-sm font-bold text-blue-600 mb-1">{c['部門']}</div>
                    <div className="text-2xl font-extrabold text-gray-900 mb-3">{c['姓名']}</div>
                    <p className="text-gray-700 leading-relaxed mb-6 whitespace-pre-wrap">{c['優良事蹟簡介']}</p>
                  </div>

                  {/* 打分元件 */}
                  <div className="bg-gray-50 p-4 rounded-xl flex items-center justify-between border border-gray-100">
                    <span className="font-bold text-gray-700">給予評分：</span>
                    <div className="flex space-x-2">
                      {[1, 2, 3, 4, 5].map(star => {
                        const active = scores[c['候選人ID']] === star;
                        return (
                          <button
                            key={star}
                            onClick={() => handleScoreChange(c['候選人ID'], star)}
                            className={`w-10 h-10 md:w-12 md:h-12 rounded-full font-bold text-lg transition-all transform hover:scale-110 
                              ${active ? 'bg-yellow-400 text-white shadow-lg ring-4 ring-yellow-100' : 'bg-white border-2 border-gray-200 text-gray-400 hover:border-yellow-400 hover:text-yellow-400'}
                            `}
                          >
                            {star}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* 浮動提交列 */}
          <div className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] p-4 z-50">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="text-gray-600 font-medium hidden md:block">
                已評分：<span className="text-blue-600 font-bold">{Object.keys(scores).length}</span> / {candidates.length} 人
              </div>
              <button
                onClick={handleSubmit}
                disabled={saving}
                className="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-12 rounded-full shadow-lg transition-transform transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed text-lg"
              >
                {saving ? '儲存中...' : '送出評分結果'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- 程式進入點 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
