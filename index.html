<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>114年度從業人員安全衛生優良事蹟評選系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .fade-in {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="text-gray-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 🔴 請替換成您在 GAS 部署時取得的 Web App URL
    const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbw7uChOFkNVUdNMYEG4jAlNUEg8gSoDb3zUgS2WjQX37vFqvmdHmdbTOQEaKwiRRxpu/exec";

    // --- Token 工具 ---
    const getAdminToken = () => sessionStorage.getItem('adminToken');
    const setAdminToken = (t) => sessionStorage.setItem('adminToken', t);
    const clearAdminToken = () => sessionStorage.removeItem('adminToken');
    const getSessionToken = () => sessionStorage.getItem('sessionToken');
    const setSessionToken = (t) => sessionStorage.setItem('sessionToken', t);
    const clearSessionToken = () => sessionStorage.removeItem('sessionToken');

    // --- API 呼叫模組 ---
    async function apiCall(action, params = {}) {
      try {
        const res = await fetch(GAS_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...params })
        });
        const data = await res.json();
        if (data && typeof data.success !== 'undefined' && !data.success) {
          throw new Error(data.error || data.message || 'API 操作失敗');
        }
        return data;
      } catch (err) {
        console.error("API call error:", err);
        alert("連線或伺服器錯誤: " + err.message);
        return null;
      }
    }

    // --- 共用 UI 元件 ---
    const Loading = () => <div className="py-20 text-center"><div className="loader mb-4"></div><p className="text-gray-500 font-medium">載入中，請稍候...</p></div>;

    // --- 主要元件 ---
    function App() {
      const [view, setView] = useState('gateway'); // gateway, adminLogin, voterLogin, adminPanel, voterPanel
      const [currentUser, setCurrentUser] = useState(null); // 委員登入後的資訊

      // 主畫面路由
      if (view === 'gateway') return <Gateway setView={setView} />;
      if (view === 'adminLogin') return <AdminLogin setView={setView} />;
      if (view === 'voterLogin') return <VoterLogin setView={setView} onLogin={(user) => { setCurrentUser(user); setView('voterPanel'); }} />;
      if (view === 'adminPanel') return <AdminPanel setView={setView} />;
      if (view === 'voterPanel') return <VoterPanel setView={setView} user={currentUser} onLogout={() => { setCurrentUser(null); setView('gateway'); }} />;
      return null;
    }

    // 1. 系統入口
    function Gateway({ setView }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
          <div className="glass p-10 rounded-2xl shadow-xl w-full max-w-lg text-center fade-in">
            <h1 className="text-3xl font-bold text-blue-900 mb-2">114年度優良事蹟評選系統</h1>
            <p className="text-gray-500 mb-8">請選擇登入身分進入系統</p>
            <div className="space-y-4">
              <button onClick={() => setView('voterLogin')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-md transition-all text-lg">
                評選委員入口
              </button>
              <button onClick={() => setView('adminLogin')} className="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-semibold py-4 rounded-xl shadow-sm transition-all text-lg">
                系統管理員後台
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 2. 管理員登入
    function AdminLogin({ setView }) {
      const [acc, setAcc] = useState('');
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErr('');
        setLoading(true);
        const res = await apiCall('adminLogin', { acc, pwd });
        setLoading(false);
        if (res?.success) {
          setAdminToken(res.adminToken);
          setView('adminPanel');
        } else {
          setErr(res?.message || '帳號或密碼錯誤');
        }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-900 p-6">
          <form className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm fade-in" onSubmit={handleLogin}>
            <h2 className="text-2xl font-bold text-center mb-6 text-gray-800">管理員登入</h2>
            {err && <div className="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">{err}</div>}
            <input type="text" placeholder="帳號" className="w-full border p-3 rounded mb-4" value={acc} onChange={e => setAcc(e.target.value)} required />
            <input type="password" placeholder="密碼" className="w-full border p-3 rounded mb-6" value={pwd} onChange={e => setPwd(e.target.value)} required />
            <button type="submit" disabled={loading} className="w-full bg-gray-800 hover:bg-black text-white py-3 rounded font-bold transition disabled:opacity-50">
              {loading ? '驗證中...' : '登入管理後台'}
            </button>
            <button type="button" onClick={() => setView('gateway')} className="w-full text-center text-sm text-gray-500 mt-4 hover:underline">返回首頁</button>
          </form>
        </div>
      );
    }

    // 3. 委員登入 (卡片式 UX)
    function VoterLogin({ setView, onLogin }) {
      const [loading, setLoading] = useState(true);
      const [committees, setCommittees] = useState([]);
      const [step, setStep] = useState(0); // 0: 共同密碼, 1: 部門, 2: 姓名, 3: 密碼
      const [sharedPwd, setSharedPwd] = useState('');
      const [dept, setDept] = useState('');
      const [name, setName] = useState('');
      const [code, setCode] = useState('');
      const [err, setErr] = useState('');

      // 部門對應圖示 (簡易版 SVG)
      const getDeptIcon = (deptName) => {
        if (deptName.includes('工安') || deptName.includes('安全')) return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>;
        if (deptName.includes('工程') || deptName.includes('機電')) return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
        if (deptName.includes('行政') || deptName.includes('管理')) return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>;
        if (deptName.includes('業務') || deptName.includes('行銷')) return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>;
        if (deptName.includes('生產') || deptName.includes('製造')) return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>;
        if (deptName.includes('品保') || deptName.includes('檢驗')) return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;

        // 預設圖示 (群組人像)
        return <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>;
      };

      useEffect(() => {
        apiCall('getCommittees').then(res => {
          if (res) setCommittees(res);
          setLoading(false);
        });
      }, []);

      const departments = useMemo(() => [...new Set(committees.map(c => c['部門']))], [committees]);
      const availableNames = useMemo(() => committees.filter(c => c['部門'] === dept).map(c => c['委員姓名']), [dept, committees]);

      const handleSharedPwdSubmit = (e) => {
        e.preventDefault();
        if (sharedPwd === '0505') {
          setErr('');
          setStep(1);
        } else {
          setErr('系統進入密碼錯誤，請重新輸入。');
          setSharedPwd('');
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setErr('');
        setLoading(true);
        const res = await apiCall('login', { name, login_code: code });
        setLoading(false);
        if (res?.success) {
          setSessionToken(res.sessionToken);
          onLogin(res.committee);
        } else {
          setErr(res?.message || '登入失敗');
        }
      };

      if (loading && committees.length === 0) return <Loading />;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-blue-50 p-4 md:p-6">
          <div className="bg-white p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-2xl fade-in overflow-hidden relative">
            {/* 上方返回首頁按鈕 */}
            <button onClick={() => setView('gateway')} className="absolute top-6 right-6 text-gray-400 hover:text-gray-600 font-bold transition">✕ 關閉</button>

            <h2 className="text-3xl font-extrabold text-center mb-2 text-blue-900 tracking-wide">評選委員登入</h2>
            <p className="text-center text-blue-600/80 font-medium mb-8">
              {step === 0 && '請輸入進入評選系統的密碼'}
              {step === 1 && '請選擇您所屬的部門'}
              {step === 2 && '請點選您的姓名'}
              {step === 3 && '請完成身分驗證'}
            </p>

            {err && <div className="bg-red-50 text-red-600 border border-red-200 p-4 rounded-xl mb-6 text-sm font-bold text-center shadow-sm fade-in">{err}</div>}

            {/* Step 0: 共同密碼驗證 */}
            {step === 0 && (
              <form onSubmit={handleSharedPwdSubmit} className="fade-in max-w-sm mx-auto">
                <div className="mb-8">
                  <label className="block text-gray-700 text-sm font-bold mb-3 text-center">請輸入系統進入密碼</label>
                  <input
                    type="password"
                    placeholder="請輸入密碼"
                    className="w-full border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 p-4 rounded-xl text-center text-xl tracking-widest transition bg-white"
                    value={sharedPwd}
                    onChange={e => setSharedPwd(e.target.value)}
                    required
                    autoFocus
                  />
                </div>
                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                  確認進入
                </button>
              </form>
            )}

            {/* Step 1: 選擇部門 */}
            {step === 1 && (
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 fade-in">
                {departments.map(d => (
                  <button
                    key={d}
                    onClick={() => { setDept(d); setStep(2); setErr(''); }}
                    className="flex flex-col items-center justify-center p-6 bg-gradient-to-br from-white to-blue-50 border-2 border-blue-100 hover:border-blue-400 hover:shadow-lg rounded-2xl transition-all transform hover:-translate-y-1 group"
                  >
                    <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-3 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                      {getDeptIcon(d)}
                    </div>
                    <span className="font-bold text-gray-700 group-hover:text-blue-900 text-lg">{d}</span>
                  </button>
                ))}
              </div>
            )}

            {/* Step 2: 選擇委員姓名 */}
            {step === 2 && (
              <div className="fade-in">
                <button onClick={() => { setStep(1); setDept(''); setErr(''); }} className="mb-6 text-sm text-blue-500 hover:text-blue-700 font-bold flex items-center transition">
                  ← 返回部門列表
                </button>
                <div className="text-sm font-bold text-gray-400 mb-3 ml-1">目前部門：<span className="text-blue-800">{dept}</span></div>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                  {availableNames.map(n => (
                    <button
                      key={n}
                      onClick={() => { setName(n); setStep(3); setErr(''); }}
                      className="p-5 bg-white border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50/50 rounded-2xl shadow-sm hover:shadow-md transition-all text-center group"
                    >
                      <div className="font-black text-gray-800 text-xl group-hover:text-blue-700">{n}</div>
                      <div className="text-xs text-gray-400 mt-1 font-medium">委員</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Step 3: 輸入登入代號 */}
            {step === 3 && (
              <form onSubmit={handleLogin} className="fade-in max-w-sm mx-auto">
                <button type="button" onClick={() => { setStep(2); setName(''); setCode(''); setErr(''); }} className="mb-6 text-sm text-blue-500 hover:text-blue-700 font-bold flex items-center transition">
                  ← 重新選擇姓名
                </button>

                <div className="bg-gray-50 border border-gray-200 p-6 rounded-2xl mb-6 text-center shadow-inner">
                  <div className="text-gray-500 text-sm font-bold mb-1">{dept}</div>
                  <div className="text-3xl font-black text-gray-800">{name}</div>
                </div>

                <div className="mb-8">
                  <label className="block text-gray-700 text-sm font-bold mb-3 text-center">請輸入 4 碼登入代號<br /><span className="text-xs text-blue-600 font-normal">(即您的姓名代號/員工編號末四碼)</span></label>
                  <input
                    type="password"
                    placeholder="例如: 1234"
                    className="w-full border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 p-4 rounded-xl text-center text-3xl font-mono tracking-[0.5em] transition bg-white"
                    value={code}
                    onChange={e => setCode(e.target.value)}
                    maxLength={4}
                    required
                    autoFocus
                  />
                </div>

                <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 disabled:opacity-50 disabled:transform-none">
                  {loading ? '身分驗證中...' : '確認登入並開始評選'}
                </button>
              </form>
            )}
          </div>
        </div>
      );
    }

    // 4. 管理員後台 (Admin Panel)
    function AdminPanel({ setView }) {
      const [tab, setTab] = useState('results');

      const handleLogout = async () => {
        const token = getAdminToken();
        if (token) await apiCall('adminLogout', { adminToken: token });
        clearAdminToken();
        setView('gateway');
      };

      return (
        <div className="min-h-screen bg-gray-100 fade-in">
          <nav className="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
              <div className="flex flex-col">
                <div className="font-bold text-xl tracking-wider">管理員後台</div>
                <div className="text-[10px] text-blue-300 font-mono -mt-1">v2.3 典禮優化版</div>
              </div>
              <div className="flex space-x-2">
                <button onClick={() => setTab('results')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'results' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>排行榜</button>
                <button onClick={() => setTab('votingStatus')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'votingStatus' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>投票狀況</button>
                <button onClick={() => setTab('candidates')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'candidates' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>候選人管理</button>
                <button onClick={() => setTab('committees')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'committees' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>委員管理</button>
                <button onClick={handleLogout} className="px-4 py-2 rounded-md font-medium bg-red-600 hover:bg-red-700 transition ml-4">登出</button>
              </div>
            </div>
          </nav>
          <div className="max-w-7xl mx-auto px-4 py-8">
            {tab === 'results' && <AdminResults />}
            {tab === 'votingStatus' && <AdminVotingStatus />}
            {tab === 'candidates' && <AdminCandidates />}
            {tab === 'committees' && <AdminCommittees />}
          </div>
        </div>
      );
    }

    // 4.1 管理員 - 排行榜
    function AdminResults() {
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isPlaying, setIsPlaying] = useState(true);
      const audioRef = useRef(null);

      const loadResults = () => {
        setLoading(true);
        apiCall('getResults', { adminToken: getAdminToken() }).then(res => {
          if (res) {
            setResults(res);
            if (res.length > 0) {
              if (!audioRef.current) {
                audioRef.current = new Audio('./music.mp3');
                audioRef.current.loop = true;
                audioRef.current.volume = 0.6;
              }

              if (isPlaying) {
                audioRef.current.play().catch(e => {
                  console.log('Audio auto-play blocked:', e);
                  setIsPlaying(false);
                });
              }

              // 第一波彩帶
              confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }, zIndex: 100 });
              // 第二波彩帶
              setTimeout(() => confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 100 }), 1500);
              // 第三波彩帶
              setTimeout(() => confetti({ particleCount: 150, spread: 80, origin: { y: 0.8 }, zIndex: 100 }), 3500);
            }
          }
          setLoading(false);
        });
      };

      const toggleMusic = () => {
        if (!audioRef.current) return;
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play().catch(e => console.log('Play blocked', e));
        }
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        loadResults();
        return () => {
          if (audioRef.current) {
            audioRef.current.pause();
            audioRef.current = null;
          }
        };
      }, []);

      if (loading) return <Loading />;

      const top3 = results.slice(0, 3);
      const others = results.slice(3);

      return (
        <div className="fade-in bg-gradient-to-b from-gray-900 via-gray-800 to-black min-h-[80vh] rounded-3xl p-6 md:p-12 relative overflow-hidden shadow-2xl border border-gray-700">
          <div className="absolute top-0 left-1/4 w-96 h-96 bg-yellow-500/20 rounded-full blur-[100px] pointer-events-none"></div>

    // 4.2 管理員 - 候選人管理 (CRUD & 圖片無限上傳)
    function AdminCandidates() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadData = () => { setLoading(true); apiCall('getCandidates').then(res => { if (res) setData(res); setLoading(false); }); };
      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if (!confirm('確定要刪除？這將同步刪除所有該候選人的歷史得票！')) return;
        const res = await apiCall('deleteCandidate', { id, adminToken: getAdminToken() });
        if (res && res.success) { alert('已刪除'); loadData(); }
      };

      const handleAdd = async () => {
        const dept = prompt('部門:'); if (!dept) return;
        const name = prompt('姓名:'); if (!name) return;
        const desc = prompt('事蹟簡介:'); if (!desc) return;
        const res = await apiCall('addCandidate', { department: dept, name, description: desc, adminToken: getAdminToken() });
        if (res && res.success) loadData();
      };

      const handleUploadImage = async (id) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image();
            img.onload = async () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800;
              const MAX_HEIGHT = 800;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) {
                  height *= MAX_WIDTH / width;
                  width = MAX_WIDTH;
                }
              } else {
                if (height > MAX_HEIGHT) {
                  width *= MAX_HEIGHT / height;
                  height = MAX_HEIGHT;
                }
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);

              setLoading(true);
              const res = await apiCall('uploadImage', { id, image_url: compressedBase64, adminToken: getAdminToken() });
              if (res && res.success) { alert('上傳成功'); loadData(); } else { setLoading(false); }
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        };
        input.click();
      };

      if (loading) return <Loading />;

      return (
        <div className="fade-in">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-3xl font-bold text-gray-800">候選人管理</h2>
            <button onClick={handleAdd} className="bg-green-600 text-white px-4 py-2 rounded font-bold shadow hover:bg-green-700">+ 新增候選人</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {data.map(c => (
              <div key={c.id} className="bg-white rounded-xl shadow p-6 relative border border-gray-100">
                <div className="absolute top-4 right-4 flex space-x-2">
                  <button onClick={() => handleDelete(c.id)} className="bg-red-100 text-red-600 px-2 py-1 text-xs rounded font-bold hover:bg-red-200">刪除</button>
                </div>
                {c.image_url ? (
                  <img src={c.image_url} alt={c.name} className="w-full h-48 object-cover rounded-lg mb-4 cursor-pointer hover:opacity-80 transition" onClick={() => handleUploadImage(c.id)} title="點擊更換照片" />
                ) : (
                  <div onClick={() => handleUploadImage(c.id)} className="w-full h-48 bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center mb-4 cursor-pointer hover:bg-gray-200 transition text-gray-400 font-medium">
                    + 點擊上傳照片
                  </div>
                )}
                <div className="text-sm font-bold text-blue-600 mb-1">{c.department}</div>
                <div className="text-xl font-extrabold text-gray-900 mb-2">{c.name}</div>
                <p className="text-gray-600 text-sm whitespace-pre-wrap h-24 overflow-y-auto">{c.description}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // 4.3 管理員 - 委員管理
    function AdminCommittees() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadData = () => { setLoading(true); apiCall('getCommittees').then(res => { if (res) setData(res); setLoading(false); }); };
      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if (!confirm('刪除將無法復原，確認？')) return;
        const res = await apiCall('deleteCommittee', { id, adminToken: getAdminToken() });
        if (res && res.success) loadData();
      };

      if (loading) return <Loading />;

      return (
        <div className="fade-in bg-white p-6 rounded-xl shadow border border-gray-200">
          <div className="mb-6 flex justify-between">
            <h2 className="text-2xl font-bold">委員名單</h2>
            <div className="text-sm text-gray-500">注意：新增請直接至 Google Sheets 直接填寫更加快速喔。</div>
          </div>
          <table className="w-full text-left">
            <thead className="bg-gray-50 border-b">
              <tr>
                <th className="p-4">部門</th><th className="p-4">姓名</th><th className="p-4">密碼狀態</th><th className="p-4">操作</th>
              </tr>
            </thead>
            <tbody className="divide-y">
              {data.map(c => (
                <tr key={c.id}>
                  <td className="p-4">{c.department}</td>
                  <td className="p-4">{c.name}</td>
                  <td className="p-4 text-green-600 font-medium">✔ 已設定</td>
                  <td className="p-4"><button onClick={() => handleDelete(c.id)} className="text-red-600 font-bold text-sm">刪除</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )
    }

    // 5. 委員評分面板 (Voter Panel)
    function VoterPanel({ setView, user, onLogout }) {
      const [candidates, setCandidates] = useState([]);
      const [scores, setScores] = useState({});
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);

      useEffect(() => {
        // 第一波：先抓取「無照片」的候選人與歷史投票紀錄，加速畫面第一次渲染
        Promise.all([
          apiCall('getCandidates', { noImage: true }),
          apiCall('getVotes', { sessionToken: getSessionToken() })
        ]).then(([candRes, voteRes]) => {
          if (candRes) setCandidates(candRes);
          if (voteRes && Array.isArray(voteRes)) {
            const initScores = {};
            voteRes.forEach(v => {
              const cid = v.candidate_id || v.candidateId;
              if (cid) initScores[cid] = Number(v.score);
            });
            setScores(initScores);
          }
          setLoading(false);

          // 第二波：在背景默默下載完整的照片資源，回來後再更新到 state 中
          apiCall('getCandidates').then(fullCandRes => {
            if (fullCandRes) setCandidates(fullCandRes);
          });
        });
      }, []);

      const handleScoreChange = (id, val) => {
        setScores(prev => ({ ...prev, [id]: Number(val) }));
      };

      const handleLogout = async () => {
        const token = getSessionToken();
        if (token) await apiCall('voterLogout', { sessionToken: token });
        clearSessionToken();
        onLogout();
      };

      const handlePreSubmit = () => {
        // 防呆：每一位都必須填寫
        const unvoted = candidates.filter(c => !scores[c.id]);
        if (unvoted.length > 0) {
          alert(`您還有 ${unvoted.length} 位尚未評分喔！請將所有人評分完畢再送出。`);
          const el = document.getElementById(`cand-${unvoted[0].id}`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }
        setShowConfirm(true);
      };

      const handleSubmit = async () => {
        setSaving(true);
        const payloadVotes = candidates.map(c => ({
          candidateId: c.id,
          score: scores[c.id]
        }));

        const res = await apiCall('vote', { sessionToken: getSessionToken(), votes: payloadVotes });
        setSaving(false);
        if (res?.success) {
          setShowConfirm(false);
          confetti({ particleCount: 100, spread: 70 });
          alert('評分送出成功！您隨時可以再次登入修改。');
        }
      };

      if (loading) return <Loading />;

      return (
        <div className="min-h-screen bg-gray-50 fade-in pb-32">
          {/* Header */}
          <div className="bg-blue-600 text-white shadow-md sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-xl font-bold">評選區</h1>
                <div className="text-sm text-blue-200">您好，{user.department} - {user.name}</div>
              </div>
              <button onClick={handleLogout} className="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-bold transition">登出返回</button>
            </div>
          </div>

          <div className="max-w-4xl mx-auto px-4 py-8 space-y-8">
            <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-blue-800 font-medium text-sm">
              請瀏覽以下優良事蹟，並為每位候選人給予 1 到 5 分的評分（5星為最高分）。所有候選人均需評分後才可送出。
            </div>

            {candidates.map(c => (
              <div key={c.id} id={`cand-${c.id}`} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row gap-6 hover:shadow-md transition">
                {/* 照片區 */}
                <div className="w-full md:w-48 flex-shrink-0">
                  {c.image_url ? (
                    <img src={c.image_url} alt={c.name} className="w-full h-48 md:h-full object-cover rounded-xl shadow-sm" />
                  ) : (
                    <div className="w-full h-48 md:h-full bg-gray-100 rounded-xl flex items-center justify-center text-gray-400 shadow-inner">無照片</div>
                  )}
                </div>

                {/* 內容評分區 */}
                <div className="flex-grow flex flex-col justify-between">
                  <div>
                    <div className="text-sm font-bold text-blue-600 mb-1">{c.department}</div>
                    <div className="text-2xl font-extrabold text-gray-900 mb-3">{c.name}</div>
                    <p className="text-gray-700 leading-relaxed mb-6 whitespace-pre-wrap">{c.description}</p>
                  </div>

                  {/* 打分元件 */}
                  <div className="bg-gray-50 p-4 rounded-xl flex items-center justify-between border border-gray-100">
                    <span className="font-bold text-gray-700">給予評分：</span>
                    <div className="flex space-x-2">
                      {[1, 2, 3, 4, 5].map(star => {
                        const active = scores[c.id] === star;
                        return (
                          <button
                            key={star}
                            onClick={() => handleScoreChange(c.id, star)}
                            className={`w-10 h-10 md:w-12 md:h-12 rounded-full font-bold text-lg transition-all transform hover:scale-110 
                              ${active ? 'bg-yellow-400 text-white shadow-lg ring-4 ring-yellow-100' : 'bg-white border-2 border-gray-200 text-gray-400 hover:border-yellow-400 hover:text-yellow-400'}
                            `}
                          >
                            {star}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* 浮動提交列 */}
          <div className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] p-4 z-50">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="text-gray-600 font-medium hidden md:block">
                已評分：<span className="text-blue-600 font-bold">{Object.keys(scores).filter(k => scores[k] > 0).length}</span> / {candidates.length} 人
              </div>
              <button
                onClick={handlePreSubmit}
                disabled={saving}
                className="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-12 rounded-full shadow-lg transition-transform transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed text-lg"
              >
                {saving ? '處理中...' : '送出評分結果'}
              </button>
            </div>
          </div>

          {/* 確認投票 Modal */}
          {showConfirm && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm shadow-2xl fade-in" onClick={() => setShowConfirm(false)}>
              <div className="bg-white rounded-2xl w-full max-w-xl shadow-2xl border border-gray-200 overflow-hidden flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                <div className="bg-gradient-to-r from-blue-700 to-blue-600 px-6 py-5 flex items-center text-white">
                  <div>
                    <h3 className="text-2xl font-black flex items-center gap-2">
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                      確認您的評分
                    </h3>
                    <p className="text-sm font-medium text-blue-100 mt-1">請再次確認您給予各候選人的分數，送出後即完成投票。</p>
                  </div>
                </div>

                <div className="p-0 overflow-y-auto flex-1 bg-gray-50" style={{ backgroundImage: "url('https://www.transparenttextures.com/patterns/cubes.png')" }}>
                  <ul className="divide-y divide-gray-200">
                    {candidates.map((c, i) => (
                      <li key={c.id} className="flex justify-between items-center px-6 py-4 bg-white/90 hover:bg-blue-50/50 transition-colors">
                        <div className="flex items-center gap-4">
                          <span className="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-500 text-sm font-bold border border-gray-200 shadow-sm">{i + 1}</span>
                          <div className="flex flex-col">
                            <span className="font-bold text-gray-900 text-lg">{c.name}</span>
                            <span className="text-sm text-gray-500">{c.department}</span>
                          </div>
                        </div>
                        <div className="flex items-baseline gap-1">
                          <span className={`text-3xl font-black drop-shadow-sm ${scores[c.id] >= 4 ? 'text-yellow-500' : 'text-green-600'}`}>{scores[c.id]}</span>
                          <span className="text-sm text-gray-500 font-bold ml-1">分</span>
                        </div>
                      </li>
                    ))}
                  </ul>
                </div>

                <div className="px-6 py-5 border-t border-gray-200 bg-gray-50 flex flex-col-reverse sm:flex-row justify-end gap-3 shadow-[0_-5px_15px_rgba(0,0,0,0.02)] z-10">
                  <button onClick={() => setShowConfirm(false)} disabled={saving} className="w-full sm:w-auto px-6 py-3 bg-white hover:bg-gray-100 border border-gray-300 text-gray-700 font-bold rounded-xl transition-colors shadow-sm">返回修改</button>
                  <button onClick={handleSubmit} disabled={saving} className="w-full sm:w-auto px-8 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center justify-center transform hover:-translate-y-0.5" style={{ transition: "all 0.2s" }}>
                    {saving ? '送出中...' : '確認投下神聖的一票'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 程式進入點 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
