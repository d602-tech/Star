<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>114年度從業人員安全衛生優良事蹟評選系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .fade-in {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="text-gray-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 🔴 請替換成您在 GAS 部署時取得的 Web App URL
    const GAS_APP_URL = "https://script.google.com/macros/s/AKfycbw7uChOFkNVUdNMYEG4jAlNUEg8gSoDb3zUgS2WjQX37vFqvmdHmdbTOQEaKwiRRxpu/exec";

    // --- Token 工具 ---
    const getAdminToken = () => sessionStorage.getItem('adminToken');
    const setAdminToken = (t) => sessionStorage.setItem('adminToken', t);
    const clearAdminToken = () => sessionStorage.removeItem('adminToken');
    const getSessionToken = () => sessionStorage.getItem('sessionToken');
    const setSessionToken = (t) => sessionStorage.setItem('sessionToken', t);
    const clearSessionToken = () => sessionStorage.removeItem('sessionToken');

    // --- API 呼叫模組 ---
    async function apiCall(action, params = {}) {
      try {
        const res = await fetch(GAS_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...params })
        });
        const data = await res.json();
        if (data && typeof data.success !== 'undefined' && !data.success) {
          throw new Error(data.error || data.message || 'API 操作失敗');
        }
        return data;
      } catch (err) {
        console.error("API call error:", err);
        alert("連線或伺服器錯誤: " + err.message);
        return null;
      }
    }

    // --- 共用 UI 元件 ---
    const Loading = () => <div className="py-20 text-center"><div className="loader mb-4"></div><p className="text-gray-500 font-medium">載入中，請稍候...</p></div>;

    // --- 主要元件 ---
    function App() {
      const [view, setView] = useState('gateway'); // gateway, adminLogin, voterLogin, adminPanel, voterPanel
      const [currentUser, setCurrentUser] = useState(null); // 委員登入後的資訊

      // 主畫面路由
      if (view === 'gateway') return <Gateway setView={setView} />;
      if (view === 'adminLogin') return <AdminLogin setView={setView} />;
      if (view === 'voterLogin') return <VoterLogin setView={setView} onLogin={(user) => { setCurrentUser(user); setView('voterPanel'); }} />;
      if (view === 'adminPanel') return <AdminPanel setView={setView} />;
      if (view === 'voterPanel') return <VoterPanel setView={setView} user={currentUser} onLogout={() => { setCurrentUser(null); setView('gateway'); }} />;
      return null;
    }

    // 1. 系統入口
    function Gateway({ setView }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
          <div className="glass p-10 rounded-2xl shadow-xl w-full max-w-lg text-center fade-in">
            <h1 className="text-3xl font-bold text-blue-900 mb-2">114年度優良事蹟評選系統</h1>
            <p className="text-gray-500 mb-8">請選擇登入身分進入系統</p>
            <div className="space-y-4">
              <button onClick={() => setView('voterLogin')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-md transition-all text-lg">
                評選委員入口
              </button>
              <button onClick={() => setView('adminLogin')} className="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-semibold py-4 rounded-xl shadow-sm transition-all text-lg">
                系統管理員後台
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 2. 管理員登入
    function AdminLogin({ setView }) {
      const [acc, setAcc] = useState('');
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErr('');
        setLoading(true);
        const res = await apiCall('adminLogin', { acc, pwd });
        setLoading(false);
        if (res?.success) {
          setAdminToken(res.adminToken);
          setView('adminPanel');
        } else {
          setErr(res?.message || '帳號或密碼錯誤');
        }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-900 p-6">
          <form className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm fade-in" onSubmit={handleLogin}>
            <h2 className="text-2xl font-bold text-center mb-6 text-gray-800">管理員登入</h2>
            {err && <div className="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">{err}</div>}
            <input type="text" placeholder="帳號" className="w-full border p-3 rounded mb-4" value={acc} onChange={e => setAcc(e.target.value)} required />
            <input type="password" placeholder="密碼" className="w-full border p-3 rounded mb-6" value={pwd} onChange={e => setPwd(e.target.value)} required />
            <button type="submit" disabled={loading} className="w-full bg-gray-800 hover:bg-black text-white py-3 rounded font-bold transition disabled:opacity-50">
              {loading ? '驗證中...' : '登入管理後台'}
            </button>
            <button type="button" onClick={() => setView('gateway')} className="w-full text-center text-sm text-gray-500 mt-4 hover:underline">返回首頁</button>
          </form>
        </div>
      );
    }

    // 3. 委員登入
    function VoterLogin({ setView, onLogin }) {
      const [loading, setLoading] = useState(true);
      const [committees, setCommittees] = useState([]);
      const [dept, setDept] = useState('');
      const [name, setName] = useState('');
      const [code, setCode] = useState('');
      const [err, setErr] = useState('');

      useEffect(() => {
        apiCall('getCommittees').then(res => {
          if (res) setCommittees(res);
          setLoading(false);
        });
      }, []);

      const departments = useMemo(() => [...new Set(committees.map(c => c['部門']))], [committees]);
      const availableNames = useMemo(() => committees.filter(c => c['部門'] === dept).map(c => c['委員姓名']), [dept, committees]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErr('');
        setLoading(true);
        const res = await apiCall('login', { name, login_code: code });
        setLoading(false);
        if (res?.success) {
          setSessionToken(res.sessionToken); // 存 token，不存 login_code
          onLogin(res.committee);
        } else {
          setErr(res?.message || '登入失敗');
        }
      };

      if (loading && committees.length === 0) return <Loading />;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-blue-50 p-6">
          <form className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in" onSubmit={handleLogin}>
            <h2 className="text-2xl font-bold text-center mb-6 text-blue-900">評選委員登入</h2>
            {err && <div className="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">{err}</div>}

            <div className="mb-4">
              <label className="block text-gray-700 text-sm font-bold mb-2">部門</label>
              <select className="w-full border p-3 rounded bg-gray-50" value={dept} onChange={e => { setDept(e.target.value); setName(''); }} required>
                <option value="">請選擇部門</option>
                {departments.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
            </div>

            <div className="mb-4">
              <label className="block text-gray-700 text-sm font-bold mb-2">姓名</label>
              <select className="w-full border p-3 rounded bg-gray-50" value={name} onChange={e => setName(e.target.value)} required disabled={!dept}>
                <option value="">請選擇姓名</option>
                {availableNames.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>

            <div className="mb-6">
              <label className="block text-gray-700 text-sm font-bold mb-2">專屬登入代號</label>
              <input type="password" placeholder="請輸入 4 碼登入代號" className="w-full border p-3 rounded bg-gray-50" value={code} onChange={e => setCode(e.target.value)} required />
            </div>

            <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition disabled:opacity-50">
              {loading ? '驗證中...' : '開始評選'}
            </button>
            <button type="button" onClick={() => setView('gateway')} className="w-full text-center text-sm text-gray-500 mt-4 hover:underline">返回首頁</button>
          </form>
        </div>
      );
    }

    // 4. 管理員後台 (Admin Panel)
    function AdminPanel({ setView }) {
      const [tab, setTab] = useState('results');

      const handleLogout = async () => {
        const token = getAdminToken();
        if (token) await apiCall('adminLogout', { adminToken: token });
        clearAdminToken();
        setView('gateway');
      };

      return (
        <div className="min-h-screen bg-gray-100 fade-in">
          <nav className="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
              <div className="flex flex-col">
                <div className="font-bold text-xl tracking-wider">管理員後台</div>
                <div className="text-[10px] text-blue-300 font-mono -mt-1">v2.3 典禮優化版</div>
              </div>
              <div className="flex space-x-2">
                <button onClick={() => setTab('results')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'results' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>排行榜</button>
                <button onClick={() => setTab('votingStatus')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'votingStatus' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>投票狀況</button>
                <button onClick={() => setTab('candidates')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'candidates' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>候選人管理</button>
                <button onClick={() => setTab('committees')} className={`px-4 py-2 rounded-md font-medium transition ${tab === 'committees' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>委員管理</button>
                <button onClick={handleLogout} className="px-4 py-2 rounded-md font-medium bg-red-600 hover:bg-red-700 transition ml-4">登出</button>
              </div>
            </div>
          </nav>
          <div className="max-w-7xl mx-auto px-4 py-8">
            {tab === 'results' && <AdminResults />}
            {tab === 'votingStatus' && <AdminVotingStatus />}
            {tab === 'candidates' && <AdminCandidates />}
            {tab === 'committees' && <AdminCommittees />}
          </div>
        </div>
      );
    }

    // 4.1 管理員 - 排行榜
    function AdminResults() {
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isPlaying, setIsPlaying] = useState(true);
      const audioRef = useRef(null);

      const loadResults = () => {
        setLoading(true);
        apiCall('getResults', { adminToken: getAdminToken() }).then(res => {
          if (res) {
            setResults(res);
            if (res.length > 0) {
              if (!audioRef.current) {
                audioRef.current = new Audio('./music.mp3');
                audioRef.current.loop = true;
                audioRef.current.volume = 0.6;
              }

              if (isPlaying) {
                audioRef.current.play().catch(e => {
                  console.log('Audio auto-play blocked:', e);
                  setIsPlaying(false);
                });
              }

              // 第一波彩帶
              confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }, zIndex: 100 });
              // 第二波彩帶
              setTimeout(() => confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 100 }), 1500);
              // 第三波彩帶
              setTimeout(() => confetti({ particleCount: 150, spread: 80, origin: { y: 0.8 }, zIndex: 100 }), 3500);
            }
          }
          setLoading(false);
        });
      };

      const toggleMusic = () => {
        if (!audioRef.current) return;
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play().catch(e => console.log('Play blocked', e));
        }
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        loadResults();
        return () => {
          if (audioRef.current) {
            audioRef.current.pause();
            audioRef.current = null;
          }
        };
      }, []);

      if (loading) return <Loading />;

      const top3 = results.slice(0, 3);
      const others = results.slice(3);

      return (
        <div className="fade-in bg-gradient-to-b from-gray-900 via-gray-800 to-black min-h-[80vh] rounded-3xl p-6 md:p-12 relative overflow-hidden shadow-2xl border border-gray-700">
          <div className="absolute top-0 left-1/4 w-96 h-96 bg-yellow-500/20 rounded-full blur-[100px] pointer-events-none"></div>
          <div className="absolute top-0 right-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>

          <div className="relative z-10 flex flex-col md:flex-row justify-between items-center md:items-end mb-16 gap-6">
            <h2 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-yellow-600 drop-shadow-[0_2px_10px_rgba(255,215,0,0.5)] tracking-widest pl-4 border-l-8 border-yellow-500">🏆 評選總排行榜</h2>
            <div className="flex items-center space-x-4">
              <button
                onClick={toggleMusic}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-bold shadow-lg transition-all duration-300 border-2 ${isPlaying
                  ? 'bg-yellow-500 text-black border-yellow-400 animate-pulse'
                  : 'bg-gray-800 text-yellow-500 border-gray-600 hover:bg-gray-700'
                  }`}
              >
                {isPlaying ? (
                  <><span>🎵 頒獎音樂播放中</span></>
                ) : (
                  <><span>🔇 音樂已暫停</span></>
                )}
              </button>
              <button onClick={loadResults} className="text-gray-300 hover:text-white bg-gray-800/80 px-6 py-2 rounded-lg border border-gray-600 backdrop-blur-md shadow-lg transition font-bold">重新整理</button>
            </div>
          </div>

          {top3.length > 0 && (
            <div className="flex flex-col md:flex-row justify-center items-end min-h-[450px] mb-16 space-y-8 md:space-y-0 md:space-x-8 px-4">

              {top3[1] && (
                <div className="flex flex-col items-center w-full md:w-64 animate-[fadeIn_0.5s_ease-out] z-10">
                  <div className="mb-4 relative">
                    {top3[1].image_url ? (
                      <img src={top3[1].image_url} className="w-28 h-28 md:w-36 md:h-36 rounded-full object-cover border-[6px] border-gray-300 shadow-[0_0_20px_rgba(200,200,200,0.5)] relative z-10" alt={top3[1].name} />
                    ) : (
                      <div className="w-28 h-28 md:w-36 md:h-36 rounded-full bg-gray-200 border-[6px] border-gray-300 shadow-[0_0_20px_rgba(200,200,200,0.5)] flex items-center justify-center text-gray-500 font-bold text-3xl relative z-10">?</div>
                    )}
                    <div className="absolute top-[-20px] left-[-20px] bg-gradient-to-r from-gray-400 to-gray-200 text-gray-900 font-black text-sm px-4 py-1 rounded shadow-lg transform -rotate-12 z-20">🥈 亞軍</div>
                  </div>
                  <div className="bg-gray-800/60 backdrop-blur-md text-white rounded-xl p-4 w-full text-center border border-gray-600 shadow-xl mb-4 relative z-10">
                    <div className="text-2xl font-black text-gray-100 mb-1">{top3[1].name}</div>
                    <div className="text-sm text-gray-400 mb-2">{top3[1].department} / {top3[1].totalScore}分</div>
                    <div className="bg-red-700 text-white font-bold text-sm px-3 py-1.5 rounded-md shadow-inner border border-red-500">獎金 1000 元</div>
                  </div>
                  <div className="w-full bg-gradient-to-t from-gray-500 to-gray-300 rounded-t-lg flex flex-col items-center justify-end text-white pb-6 min-h-[220px] border-t-8 border-gray-200 shadow-[0_-5px_25px_rgba(200,200,200,0.2)]">
                    <span className="font-black text-6xl drop-shadow-lg text-gray-800 opacity-80">2</span>
                  </div>
                </div>
              )}

              {top3[0] && (
                <div className="flex flex-col items-center w-full md:w-80 animate-[fadeIn_0.7s_ease-out] z-20">
                  <div className="mb-4 relative">
                    <div className="absolute -top-16 left-1/2 transform -translate-x-1/2 text-7xl drop-shadow-[0_5px_15px_rgba(255,215,0,0.8)] z-30">👑</div>
                    {top3[0].image_url ? (
                      <img src={top3[0].image_url} className="w-36 h-36 md:w-48 md:h-48 rounded-full object-cover border-[8px] border-yellow-400 shadow-[0_0_40px_rgba(255,215,0,0.6)] relative z-20" alt={top3[0].name} />
                    ) : (
                      <div className="w-36 h-36 md:w-48 md:h-48 rounded-full bg-gray-200 border-[8px] border-yellow-400 shadow-[0_0_40px_rgba(255,215,0,0.6)] flex items-center justify-center text-gray-500 font-bold text-4xl relative z-20">?</div>
                    )}
                    <div className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-yellow-500 via-yellow-400 to-yellow-500 text-black font-black text-lg px-8 py-1.5 rounded-full shadow-[0_5px_15px_rgba(0,0,0,0.5)] whitespace-nowrap z-30 border border-yellow-200">🥇 冠軍</div>
                  </div>
                  <div className="bg-gray-800/80 backdrop-blur-md text-white rounded-2xl p-5 w-[110%] text-center border border-yellow-500/50 shadow-2xl mb-4 relative z-20 mt-2">
                    <div className="text-3xl font-black text-yellow-400 mb-1 drop-shadow-md">{top3[0].name}</div>
                    <div className="text-base text-gray-300 mb-3">{top3[0].department} / <span className="text-yellow-400 font-bold">{top3[0].totalScore}分</span></div>
                    <div className="bg-gradient-to-r from-red-600 to-red-800 text-yellow-100 font-black text-lg px-4 py-2 rounded-lg shadow-inner border border-red-500 tracking-wider">獎金 2000 元</div>
                  </div>
                  <div className="w-full bg-gradient-to-t from-yellow-600 via-yellow-500 to-yellow-300 rounded-t-xl flex flex-col items-center justify-end text-white pb-8 min-h-[280px] border-t-8 border-yellow-200 shadow-[0_-5px_30px_rgba(255,215,0,0.3)]">
                    <span className="font-black text-8xl drop-shadow-[0_5px_10px_rgba(0,0,0,0.3)] text-yellow-900 opacity-90">1</span>
                  </div>
                </div>
              )}

              {top3[2] && (
                <div className="flex flex-col items-center w-full md:w-64 animate-[fadeIn_0.9s_ease-out] z-10">
                  <div className="mb-4 relative">
                    {top3[2].image_url ? (
                      <img src={top3[2].image_url} className="w-28 h-28 md:w-36 md:h-36 rounded-full object-cover border-[6px] border-orange-400 shadow-[0_0_20px_rgba(246,173,85,0.5)] relative z-10" alt={top3[2].name} />
                    ) : (
                      <div className="w-28 h-28 md:w-36 md:h-36 rounded-full bg-gray-200 border-[6px] border-orange-400 shadow-[0_0_20px_rgba(246,173,85,0.5)] flex items-center justify-center text-gray-500 font-bold text-3xl relative z-10">?</div>
                    )}
                    <div className="absolute top-[-20px] right-[-20px] bg-gradient-to-r from-orange-400 to-orange-300 text-orange-900 font-black text-sm px-4 py-1 rounded shadow-lg transform rotate-12 z-20">🥉 季軍</div>
                  </div>
                  <div className="bg-gray-800/60 backdrop-blur-md text-white rounded-xl p-4 w-full text-center border border-orange-500/30 shadow-xl mb-4 relative z-10">
                    <div className="text-2xl font-black text-orange-300 mb-1">{top3[2].name}</div>
                    <div className="text-sm text-gray-400 mb-2">{top3[2].department} / {top3[2].totalScore}分</div>
                    <div className="bg-red-700 text-white font-bold text-sm px-3 py-1.5 rounded-md shadow-inner border border-red-500">獎金 500 元</div>
                  </div>
                  <div className="w-full bg-gradient-to-t from-orange-700 to-orange-400 rounded-t-lg flex flex-col items-center justify-end text-white pb-6 min-h-[190px] border-t-8 border-orange-200 shadow-[0_-5px_25px_rgba(246,173,85,0.2)]">
                    <span className="font-black text-5xl drop-shadow-lg text-orange-900 opacity-80">3</span>
                  </div>
                </div>
              )}
            </div>
          )}

          {others.length > 0 && (
            <div className="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden border border-gray-600 mt-12 relative z-10">
              <div className="bg-gradient-to-r from-gray-800 to-gray-700 px-8 py-4 border-b border-gray-600 flex justify-between items-center">
                <h3 className="text-lg font-bold text-gray-200 tracking-wide">其他名次 <span className="text-sm font-normal text-gray-400 ml-2">(參賽獎: 工安激勵品)</span></h3>
              </div>

              <div className="overflow-x-auto relative" style={{ backgroundImage: "url('https://www.transparenttextures.com/patterns/marble.png')", backgroundColor: "#fdfbfb" }}>
                <table className="min-w-full divide-y divide-gray-300 text-left relative z-10">

    // 4.2 管理員 - 候選人管理 (CRUD & 圖片無限上傳)
    function AdminCandidates() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      const loadData = () => { setLoading(true); apiCall('getCandidates').then(res => { if (res) setData(res); setLoading(false); }); };
      useEffect(() => { loadData(); }, []);

      const handleDelete = async (id) => {
        if (!confirm('確定要刪除？這將同步刪除所有該候選人的歷史得票！')) return;
        const res = await apiCall('deleteCandidate', { id, adminToken: getAdminToken() });
        if (res && res.success) { alert('已刪除'); loadData(); }
      };

      const handleAdd = async () => {
        const dept = prompt('部門:'); if (!dept) return;
        const name = prompt('姓名:'); if (!name) return;
        const desc = prompt('事蹟簡介:'); if (!desc) return;
        const res = await apiCall('addCandidate', { department: dept, name, description: desc, adminToken: getAdminToken() });
        if (res && res.success) loadData();
      };

      const handleUploadImage = async (id) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image();
            img.onload = async () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800;
              const MAX_HEIGHT = 800;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) {
                  height *= MAX_WIDTH / width;
                  width = MAX_WIDTH;
                }
              } else {
                if (height > MAX_HEIGHT) {
                  width *= MAX_HEIGHT / height;
                  height = MAX_HEIGHT;
                }
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);

              setLoading(true);
              const res = await apiCall('uploadImage', { id, image_url: compressedBase64, adminToken: getAdminToken() });
              if (res && res.success) { alert('上傳成功'); loadData(); } else { setLoading(false); }
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        };
        input.click();
      };

      if (loading) return <Loading />;

      return (
        <div className="fade-in">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-3xl font-bold text-gray-800">候選人管理</h2>
            <button onClick={handleAdd} className="bg-green-600 text-white px-4 py-2 rounded font-bold shadow hover:bg-green-700">+ 新增候選人</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {data.map(c => (
              <div key={c.id} className="bg-white rounded-xl shadow p-6 relative border border-gray-100">
                <div className="absolute top-4 right-4 flex space-x-2">
                  <button onClick={() => handleDelete(c.id)} className="bg-red-100 text-red-600 px-2 py-1 text-xs rounded font-bold hover:bg-red-200">刪除</button>
                </div>
                {c.image_url ? (
                  <img src={c.image_url} alt={c.name} className="w-full h-48 object-cover rounded-lg mb-4 cursor-pointer hover:opacity-80 transition" onClick={() => handleUploadImage(c.id)} title="點擊更換照片" />
                ) : (
                  <div onClick={() => handleUploadImage(c.id)} className="w-full h-48 bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center mb-4 cursor-pointer hover:bg-gray-200 transition text-gray-400 font-medium">
                    + 點擊上傳照片
                  </div>
                )}
                <div className="text-sm font-bold text-blue-600 mb-1">{c.department}</div>
                <div className="text-xl font-extrabold text-gray-900 mb-2">{c.name}</div>
                <p className="text-gray-600 text-sm whitespace-pre-wrap h-24 overflow-y-auto">{c.description}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // 5. 委員評分面板 (Voter Panel)
    function VoterPanel({ setView, user, onLogout }) {
      const [candidates, setCandidates] = useState([]);
      const [scores, setScores] = useState({});
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        // 同步取得候選人與歷史投票紀錄
        Promise.all([
          apiCall('getCandidates'),
          apiCall('getVotes', { sessionToken: getSessionToken() })
        ]).then(([candRes, voteRes]) => {
          if (candRes) setCandidates(candRes);
          if (voteRes && Array.isArray(voteRes)) {
            const initScores = {};
            // 修正：對齊後端回傳的 key 名稱 candidate_id
            voteRes.forEach(v => {
              const cid = v.candidate_id || v.candidateId;
              if (cid) initScores[cid] = Number(v.score);
            });
            setScores(initScores);
          }
          setLoading(false);
        });
      }, []);

      const handleScoreChange = (id, val) => {
        setScores(prev => ({ ...prev, [id]: Number(val) }));
      };

      const handleLogout = async () => {
        const token = getSessionToken();
        if (token) await apiCall('voterLogout', { sessionToken: token });
        clearSessionToken();
        onLogout();
      };

      const handleSubmit = async () => {
        // 防呆：每一位都必須填寫
        const unvoted = candidates.filter(c => !scores[c.id]);
        if (unvoted.length > 0) {
          alert(`您還有 ${unvoted.length} 位尚未評分喔！請將所有人評分完畢再送出。`);
          const el = document.getElementById(`cand-${unvoted[0].id}`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }

        setSaving(true);
        const payloadVotes = candidates.map(c => ({
          candidateId: c.id,
          score: scores[c.id]
        }));

        const res = await apiCall('vote', { sessionToken: getSessionToken(), votes: payloadVotes });
        setSaving(false);
        if (res?.success) {
          confetti({ particleCount: 100, spread: 70 });
          alert('評分送出成功！您隨時可以再次登入修改。');
        }
      };

      if (loading) return <Loading />;

      return (
        <div className="min-h-screen bg-gray-50 fade-in pb-32">
          {/* Header */}
          <div className="bg-blue-600 text-white shadow-md sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
              <div>
                <h1 className="text-xl font-bold">評選區</h1>
                <div className="text-sm text-blue-200">您好，{user.department} - {user.name}</div>
              </div>
              <button onClick={handleLogout} className="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-bold transition">登出返回</button>
            </div>
          </div>

          <div className="max-w-4xl mx-auto px-4 py-8 space-y-8">
            <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-blue-800 font-medium text-sm">
              請瀏覽以下優良事蹟，並為每位候選人給予 1 到 5 分的評分（5星為最高分）。所有候選人均需評分後才可送出。
            </div>

            {candidates.map(c => (
              <div key={c.id} id={`cand-${c.id}`} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row gap-6 hover:shadow-md transition">
                {/* 照片區 */}
                <div className="w-full md:w-48 flex-shrink-0">
                  {c.image_url ? (
                    <img src={c.image_url} alt={c.name} className="w-full h-48 md:h-full object-cover rounded-xl shadow-sm" />
                  ) : (
                    <div className="w-full h-48 md:h-full bg-gray-100 rounded-xl flex items-center justify-center text-gray-400 shadow-inner">無照片</div>
                  )}
                </div>

                {/* 內容評分區 */}
                <div className="flex-grow flex flex-col justify-between">
                  <div>
                    <div className="text-sm font-bold text-blue-600 mb-1">{c.department}</div>
                    <div className="text-2xl font-extrabold text-gray-900 mb-3">{c.name}</div>
                    <p className="text-gray-700 leading-relaxed mb-6 whitespace-pre-wrap">{c.description}</p>
                  </div>

                  {/* 打分元件 */}
                  <div className="bg-gray-50 p-4 rounded-xl flex items-center justify-between border border-gray-100">
                    <span className="font-bold text-gray-700">給予評分：</span>
                    <div className="flex space-x-2">
                      {[1, 2, 3, 4, 5].map(star => {
                        const active = scores[c.id] === star;
                        return (
                          <button
                            key={star}
                            onClick={() => handleScoreChange(c.id, star)}
                            className={`w-10 h-10 md:w-12 md:h-12 rounded-full font-bold text-lg transition-all transform hover:scale-110 
                              ${active ? 'bg-yellow-400 text-white shadow-lg ring-4 ring-yellow-100' : 'bg-white border-2 border-gray-200 text-gray-400 hover:border-yellow-400 hover:text-yellow-400'}
                            `}
                          >
                            {star}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* 浮動提交列 */}
          <div className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] p-4 z-50">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="text-gray-600 font-medium hidden md:block">
                已評分：<span className="text-blue-600 font-bold">{Object.keys(scores).filter(k => scores[k] > 0).length}</span> / {candidates.length} 人
              </div>
              <button
                onClick={handleSubmit}
                disabled={saving}
                className="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-12 rounded-full shadow-lg transition-transform transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed text-lg"
              >
                {saving ? '儲存中...' : '送出評分結果'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- 程式進入點 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
